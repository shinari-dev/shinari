name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
      next:
        description: "Next development version (optional; defaults to <version>-dev)"
        required: false

permissions:
  contents: read

jobs:
  set-release-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      HEAD: ${{ steps.version.outputs.HEAD }}
      RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
      NEXT_VERSION: ${{ steps.version.outputs.NEXT_VERSION }}
      BRANCH_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Set release version
        id: version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          NEXT_VERSION: ${{ github.event.inputs.next }}
        run: |
          if [ -z "$NEXT_VERSION" ]; then
            PLAIN_VERSION=$(echo "${RELEASE_VERSION}" | awk 'match($0, /^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)/) { print substr($0, RSTART, RLENGTH); }')
            NEXT_VERSION="${PLAIN_VERSION}-dev"
          fi
          sed -i -E 's/^const version = ".*"/const version = "'"$RELEASE_VERSION"'"/' cli/main.go
          git add cli/main.go
          git commit -m "ci: release version $RELEASE_VERSION 🎉"
          git push --atomic origin "HEAD:${GITHUB_REF#refs/heads/}"
          {
            echo "HEAD=$(git rev-parse HEAD)"
            echo "RELEASE_VERSION=$RELEASE_VERSION"
            echo "NEXT_VERSION=$NEXT_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.RELEASE_VERSION }}"
          git push origin "v${{ steps.version.outputs.RELEASE_VERSION }}"

  release:
    needs: [set-release-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.set-release-version.outputs.HEAD }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: Test
        run: go test ./...

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump to next development version
        env:
          NEXT_VERSION: ${{ needs.set-release-version.outputs.NEXT_VERSION }}
          BRANCH_NAME: ${{ needs.set-release-version.outputs.BRANCH_NAME }}
        run: |
          sed -i -E 's/^const version = ".*"/const version = "'"$NEXT_VERSION"'"/' cli/main.go
          git add cli/main.go
          git commit -m "ci: bump version for next iteration to $NEXT_VERSION"
          git push origin "HEAD:$BRANCH_NAME"
