name: main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          check-latest: true

      # golangci-lint runs gofmt, go vet, staticcheck, errcheck and the rest
      # of the set configured in .golangci.yml. Findings annotate the PR diff.
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Build
        run: go build -o shinari ./cli

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  security:
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/trivy.yml
