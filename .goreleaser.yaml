version: 2

project_name: shinari

builds:
  - id: shinari
    main: ./cli
    binary: shinari
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Shinari is Unix-only: exec.run runs `sh -c` and the engine cancels process
    # groups via Setpgid / syscall.Kill (providers/execp), which do not exist on
    # Windows. Targets are limited to linux and darwin accordingly.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: shinari
    name_template: "shinari_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [ tar.gz ]
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  # Short hash + commit subject; drop the default author/email noise.
  format: "{{ slice .SHA 0 7 }} {{ .Message }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: shinari-dev
    name: shinari
  draft: false
  prerelease: auto
