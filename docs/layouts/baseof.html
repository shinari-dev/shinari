<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}">
{{ partial "head.html" . }}
<body class="{{ if .IsHome }}is-home{{ end }}">
  {{ partial "header.html" . }}
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
  {{ with resources.Get "js/copy-code.js" | minify | fingerprint }}
  <script src="{{ .RelPermalink }}" defer></script>
  {{ end }}
</body>
</html>
