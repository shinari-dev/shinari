baseURL = 'https://shinari.dev/'
locale = 'en-US'
title = 'Shinari'

enableRobotsTXT = true
disableHugoGeneratorInject = true
disableKinds = ['taxonomy', 'term']

[params]
  tagline = 'Prove your system survives failure.'
  description = 'Resilience, tested before you ship. Shinari brings up your real system, injects controlled faults, and proves it recovers, deterministically, as a YAML test on your laptop or in CI. From assumption to assertion.'
  github = 'https://github.com/shinari-dev/shinari'

[markup]
  [markup.highlight]
    style = 'github-dark'
    noClasses = true
    lineNos = false
  [markup.goldmark.renderer]
    unsafe = true

[menus]
  [[menus.main]]
    name = 'Tutorials'
    pageRef = '/tutorials'
    weight = 10
  [[menus.main]]
    name = 'How-to'
    pageRef = '/how-to'
    weight = 20
  [[menus.main]]
    name = 'Reference'
    pageRef = '/reference'
    weight = 30
  [[menus.main]]
    name = 'Concepts'
    pageRef = '/concepts'
    weight = 40
  [[menus.main]]
    name = 'Developers'
    pageRef = '/developers'
    weight = 50
