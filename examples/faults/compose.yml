services:
  api:
    image: hashicorp/http-echo
    # Pumba matches container names, not compose service names. Pin the
    # container name so netem/resource targets (target: api) resolve.
    container_name: api
    command: ["-text=ok"]
    ports:
      - "5678:5678"
  cache:
    image: redis:7-alpine
    container_name: cache
    # A pure in-memory cache: no RDB snapshot, no AOF. A restart therefore comes
    # back empty, which is the cold-cache the scenario exercises.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
