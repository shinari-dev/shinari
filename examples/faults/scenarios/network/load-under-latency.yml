apiVersion: shinari/v1
kind: Scenario
name: api-stays-fast-under-load-and-latency
description: Under sustained load, the api's p95 degrades when its network is delayed, then recovers when the delay is cleared. Degradation is judged against a healthy baseline measured in the same run, not a hardcoded millisecond threshold.

setup:
  - run: docker.up
    with: [api]

steadyState:
  - run: http.get
    with: "http://localhost:5678/"

method:
  - phase: "Drive load while delaying the network"
    steps:
      # Measure healthy latency first, before any fault. This baseline is the
      # reference every degradation check below compares against — so the
      # thresholds are ratios that travel across machines and CI runners,
      # not millisecond constants guessed for one box.
      - run: sample
        with: { probe: { run: http.get, with: "http://localhost:5678/" }, count: 10 }
        as: baseline
        desc: "healthy baseline latency, before the fault"
      - run: parallel
        with:
          branches:
            # Workload: sustained traffic for the whole window.
            - - run: load.run
                with: { target: "/", rate: 50, duration: 6 }
                as: loaded
            # Fault: gate on an observed healthy response, then inject latency
            # mid-load (event-gated, never a timer).
            - - run: wait_until
                with:
                  probe: { run: http.get, with: "http://localhost:5678/" }
                  matches: "ok"
                  timeout: 30
              - run: netem.delay
                with: { target: api, ms: 300 }
      - run: assert
        with: { of: "${.outputs.loaded.value.p95 / .outputs.baseline.value.p95}", gt: 1.5 }
        desc: "the 300ms delay shows up: p95 under load at least 1.5x the healthy baseline"
  - phase: "Clear the fault and confirm recovery"
    steps:
      - run: netem.clear
        with: api
      - run: sample
        with: { probe: { run: http.get, with: "http://localhost:5678/" }, count: 10 }
        as: recovered
      - run: assert
        with: { of: "${.outputs.recovered.value.p99 / .outputs.baseline.value.p99}", lt: 1.2 }
        desc: "after clear, p99 back within 20% of the healthy baseline"

teardown:
  - run: docker.down
