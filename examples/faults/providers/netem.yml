apiVersion: shinari/v1
kind: Provider
name: netem
description: Kernel-level network faults via Pumba netem — complements toxiproxy.

verbs:
  delay:
    params: [target, ms]
    do:
      - run: background
        effect: degradation
        with:
          name: "netem-${.params.target}"
          step:
            run: exec.run
            with: "pumba netem --duration 24h delay --time ${.params.ms} ${.params.target}"
  loss:
    params: [target, percent]
    do:
      - run: background
        effect: degradation
        with:
          name: "netem-${.params.target}"
          step:
            run: exec.run
            with: "pumba netem --duration 24h loss --percent ${.params.percent} ${.params.target}"
  rate:
    params: [target, kbps]
    do:
      - run: background
        effect: degradation
        with:
          name: "netem-${.params.target}"
          step:
            run: exec.run
            with: "pumba netem --duration 24h rate --rate ${.params.kbps}kbit ${.params.target}"
  clear:
    params: [target]
    do:
      - run: stop_background
        with: "netem-${.params.target}"
