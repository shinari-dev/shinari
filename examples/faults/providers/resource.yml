apiVersion: shinari/v1
kind: Provider
name: resource
description: Resource-exhaustion faults via Pumba stress (cpu, memory, io).

verbs:
  cpu:
    params: [target, load]
    do:
      - run: background
        effect: degradation
        with:
          name: "stress-${.params.target}"
          step:
            run: exec.run
            with: "pumba stress --duration 24h --stressors '--cpu ${.params.load}' ${.params.target}"
  memory:
    params: [target, bytes]
    do:
      - run: background
        effect: degradation
        with:
          name: "stress-${.params.target}"
          step:
            run: exec.run
            with: "pumba stress --duration 24h --stressors '--vm 1 --vm-bytes ${.params.bytes}' ${.params.target}"
  io:
    params: [target, workers]
    do:
      - run: background
        effect: degradation
        with:
          name: "stress-${.params.target}"
          step:
            run: exec.run
            with: "pumba stress --duration 24h --stressors '--io ${.params.workers}' ${.params.target}"
  clear:
    params: [target]
    do:
      - run: stop_background
        with: "stress-${.params.target}"
