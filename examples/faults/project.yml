apiVersion: shinari/v1
kind: Project
name: faults
description: Demonstrates the netem and resource composed fault providers (requires docker + pumba).

providers:
  exec: {}
  http: {}
  load:
    config:
      baseUrl: http://localhost:5678
  docker:
    config:
      composeFiles: [compose.yml]
  cache:
    source: redis
    config:
      addr: localhost:6379
  netem:
    use: ./providers/netem
  resource:
    use: ./providers/resource
